<!DOCTYPE html>
<html lang="es">

<head>

    <title>Blog</title>

<body class="body">

    <style>
        body {
            background: #833AB4;
            background: linear-gradient(90deg, rgba(131, 58, 180, 1) 0%, rgba(253, 29, 29, 1) 50%, rgba(252, 176, 69, 1) 100%);

        }

        .header {
            text-align: center;
            color: white;
            padding: 20px;
            /*efecto blur*/
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            /*fin efecto blur*/
            width: 200px;
            display: flex;
            justify-content: center;
            margin: 20px auto;
        }

        .article {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin: 20px auto;
            width: auto;
            color: white;
        }

        .footer {
            background: #443b4a;
            color: azure;
            width: 100%;
        }

        .main {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 40px;
            border: 1px solid #ccc;
            padding: 20px;
        }

        .nav {
            width: 100%;
            background-color: antiquewhite;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px;
        }
    </style>
